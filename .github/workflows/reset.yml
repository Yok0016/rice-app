name: Auto Reset Rice List

on:
  schedule:
    - cron: '0 7 * * *'  # 14:00 เวลาไทย (UTC+7 = UTC 07:00)

jobs:
  reset:
    runs-on: ubuntu-latest
    steps:
      - name: Reset Firebase Data
        run: |
          curl -X PATCH \
            "https://test001-278c6-default-rtdb.asia-southeast1.firebasedatabase.app/rice.json" \
            -H "Content-Type: application/json" \
            -d '{"people": null, "lastReset": "auto-reset"}'
