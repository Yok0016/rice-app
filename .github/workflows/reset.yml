name: Auto Reset Rice List

on:
  schedule:
    - cron: '0 7 * * *'  # 14:00 เวลาไทย

jobs:
  reset:
    runs-on: ubuntu-latest
    steps:
      - name: Reset and Save History to Firebase
        run: |
          python3 << 'EOF'
          import urllib.request
          import json
          from datetime import datetime, timezone, timedelta

          FB = "https://test001-278c6-default-rtdb.asia-southeast1.firebasedatabase.app"

          # ดึงข้อมูล people ปัจจุบัน
          req = urllib.request.urlopen(f"{FB}/rice/people.json")
          people_raw = json.loads(req.read())

          # แปลงเป็น list
          people = list(people_raw.values()) if people_raw else []

          # สร้าง snapshot สถิติ
          if people:
              tz = timezone(timedelta(hours=7))
              now = datetime.now(tz)
              date_str = now.strftime("%d/%m/%Y")
              total = sum(float(p.get("pts", 1)) for p in people)
              cups = round(total / 6, 2)
              snapshot = {
                  "date": date_str,
                  "time": now.strftime("%H:%M"),
                  "people": people,
                  "total": total,
                  "cups": cups
              }
              # บันทึกลง Firebase history
              key = str(int(now.timestamp() * 1000))
              data = json.dumps({key: snapshot}).encode()
              req2 = urllib.request.Request(
                  f"{FB}/rice/history.json",
                  data=data,
                  headers={"Content-Type": "application/json"},
                  method="PATCH"
              )
              urllib.request.urlopen(req2)
              print(f"Saved history: {date_str} | {len(people)} คน | {cups} ถ้วย")
          else:
              print("No people to save, skipping history")

          # รีเซ็ต people
          tz = timezone(timedelta(hours=7))
          now = datetime.now(tz)
          reset_data = json.dumps({
              "people": None,
              "lastReset": now.strftime("%H:%M")
          }).encode()
          req3 = urllib.request.Request(
              f"{FB}/rice.json",
              data=reset_data,
              headers={"Content-Type": "application/json"},
              method="PATCH"
          )
          urllib.request.urlopen(req3)
          print("Reset complete!")
          EOF
